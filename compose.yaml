x-mq: &mq
  image: rabbitmq:3-management
  environment:
    RABBITMQ_ERLANG_COOKIE: secret
  volumes:
    - ./docker/mq/rabbitmq.conf:/etc/rabbitmq/conf.d/rabbitmq.conf
  profiles:
    - mq

x-app-base: &app-base
  environment:
    SPRING_RABBITMQ_ADDRESSES: "mq1:5672,mq2:5672,mq3:5672"
    MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://grafana-lgtm:4318/v1/metrics
    MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://grafana-lgtm:4318/v1/traces
    MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_OTLP_ENDPOINT: http://grafana-lgtm:4318/v1/logs
    MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
    MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    LOGGING_LEVEL_COM_RABBITMQ_CLIENT_IMPL_RECOVERY_AUTORECOVERINGCONNECTION: DEBUG
  depends_on: [mq1, mq2, mq3]
  profiles:
    - app

services:

  mq1:
    <<: *mq
    hostname: usaq1
    ports: ["15672:15672"]

  mq2:
    <<: *mq
    hostname: usaq2

  mq3:
    <<: *mq
    hostname: usaq3

  consumer-service1: &consumer-service
    image: consumer-service:0.0.1-SNAPSHOT
    command: --spring.cloud.stream.rabbit.bindings.tweet-in-0.consumer.quorum.enabled=true
    <<: *app-base

  consumer-service2:
    <<: *consumer-service

  supplier-service1: &supplier-service
    image: supplier-service:0.0.1-SNAPSHOT
    <<: *app-base

  supplier-service2:
    <<: *supplier-service

  lb:
    image: nginx
    ports: ["8080:8080"]
    volumes:
      - ./docker/lb/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [supplier-service1, supplier-service2]
    profiles:
      - app

  grafana-lgtm:
    image: grafana/otel-lgtm
    ports: ["3000:3000", "4317:4317", "4318:4318"]
    profiles:
      - app
